<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Detective App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    
    <div class="screen active" id="loginScreen">
        <h2>🔐 CYBER ACCESS</h2>
        <input type="text" id="username" placeholder="Enter Codename">
        <button onclick="startGame()">ENTER</button>
    </div>

    
    <div class="screen" id="gameScreen">
        <div class="header">
            <h2>💀 CYBER DETECTIVE</h2>
            <span id="timer">60s</span>
        </div>

        <div id="output"></div>
        <div id="options"></div>

        <button class="restart" onclick="restartGame()">🔁 Restart</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
